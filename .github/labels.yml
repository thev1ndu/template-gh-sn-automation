# GitHub labels required by the ServiceNow automation.

- name: "bug"
  color: "d73a4a"
  description: "Something isn't working"

- name: "Type/Incident"
  color: "d93f0b"
  description: "Bug report or system incident"

- name: "Type/ServiceRequest"
  color: "0075ca"
  description: "Generic service request"

- name: "SRType/Normal Change"
  color: "0075ca"
  description: "SR type: Normal Change"

- name: "CatalogueItem/Generic Requests"
  color: "e4e669"
  description: "Catalog: Generic Requests (full field set)"

- name: "validation-passed"
  color: "0e8a16"
  description: "Template passed validation"

- name: "validation-failed"
  color: "b60205"
  description: "Template failed validation — check the bot comment for details"
