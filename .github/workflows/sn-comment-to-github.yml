name: ServiceNow Comment → GitHub

on:
  repository_dispatch:
    types: [servicenow-note]

permissions:
  issues: write
  contents: read

jobs:
  post-comment:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/github-script@v8
        env:
          SERVICENOW_UI_URL: ${{ secrets.SERVICENOW_UI_URL }}
        with:
          script: |
            const p = context.payload.client_payload || {};
            const issueNumber = parseInt(p.issue_number, 10);
            const noteText = p.note_text || '';
            const noteType = p.note_type || 'additional_comments';
            const caseNumber = p.case_number || '';
            const caseSysId = p.case_sys_id || '';
            const snUser = p.sn_user || 'ServiceNow Agent';
            if (!issueNumber || !noteText) {
              core.warning('Missing issue_number or note_text — skipping');
              return;
            }
            if (/\(GitHub Comment\)/.test(noteText)) {
              core.info('Note originated from GitHub — skipping to prevent echo loop');
              return;
            }
            const snUiUrl = process.env.SERVICENOW_UI_URL || '';
            const caseUrl = caseSysId && snUiUrl
              ? `${snUiUrl}/now/nav/ui/classic/params/target/sn_customerservice_case.do?sys_id=${caseSysId}&sysparm_view=wso2_cs_generic`
              : '';
            const label = noteType === 'work_notes' ? '📋 **ServiceNow Work Note**'
                        : noteType === 'update' ? '💬 **ServiceNow Update**'
                        : '💬 **ServiceNow Comment**';
            const caseRef = caseNumber
              ? (caseUrl ? ` — Case [#${caseNumber}](${caseUrl})` : ` — Case #${caseNumber}`)
              : '';
            const newlineIndex = noteText.indexOf('\n');
            const metaLine  = newlineIndex !== -1 ? noteText.slice(0, newlineIndex).trim() : '';
            const bodyText  = newlineIndex !== -1 ? noteText.slice(newlineIndex + 1).trim() : noteText;
            const formattedNote = metaLine ? `> ${metaLine}\n\n${bodyText}` : bodyText;
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: issueNumber,
              body: `${label}${caseRef}\n\n${formattedNote}\n\n---\n*Posted by ${snUser} via ServiceNow*`
            });
