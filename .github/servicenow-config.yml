# ServiceNow constants applied to every Case created from a GitHub issue.
# Edit these values to match your ServiceNow instance — then commit.
# The workflow reads this file automatically; no secrets or Actions variables needed.

case:
  category: "Issue"                                   # Category (integer/choice) — display value e.g. "Issue"
  account: "Asgardeo GH"                              # Account reference field — exact display name from SN
  announcement_type: "General"                        # Announcement Type choice — exact value from SN dropdown

project:
  name: "Customer Portal Customer Project1 - Subscription"   # Project reference field
  product: "WSO2 API Manager 1.10.0 Developer Portal"        # Product reference field
  wso2_product: "WSO2 API Manager Analytics"                 # WSO2 Product reference field
